<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이달력 — 육아지원금 D-day 알리미</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FFF8F5;--surface:#FFFCFA;--border:#F2D8DA;
  --primary:#E8707A;--primary-dk:#C94F5A;--primary-lt:#FADADD;
  --accent:#FFCBA4;--accent-lt:#FFF0E6;
  --text:#3D2226;--text-mid:#7A4E54;--text-soft:#B08A8E;
  --chip:#F7B8BF;--success:#6DBF8A;--success-lt:#E4F7EC;
  --warn:#F0A500;--warn-lt:#FFF5DC;--danger:#E05555;--danger-lt:#FDEAEA;
  --done:#F5F0F0;--hdr:rgba(255,248,245,0.9);--shadow:rgba(196,139,150,0.15);
}
[data-theme="mint"]{
  --bg:#F4FBF8;--surface:#FAFEFB;--border:#C8E9DA;
  --primary:#2BAE7E;--primary-dk:#1D8A62;--primary-lt:#B8EDD9;
  --accent:#A8D8C8;--accent-lt:#E8F7F2;
  --text:#1A3028;--text-mid:#3D6B58;--text-soft:#7AAD98;
  --chip:#9EDFC6;--success:#2BAE7E;--success-lt:#D4F5E8;
  --warn:#E09A00;--warn-lt:#FFF3D0;--danger:#D94F4F;--danger-lt:#FDEAEA;
  --done:#EDF5F1;--hdr:rgba(244,251,248,0.9);--shadow:rgba(43,174,126,0.12);
}
[data-theme="lavender"]{
  --bg:#F7F5FC;--surface:#FDFCFF;--border:#DDD5F0;
  --primary:#8B6FC8;--primary-dk:#6A50A8;--primary-lt:#DDD5F0;
  --accent:#C4B4E8;--accent-lt:#F0ECFB;
  --text:#251A3D;--text-mid:#5A4878;--text-soft:#9E8EC0;
  --chip:#C8B8E8;--success:#6BAF8A;--success-lt:#E0F5EA;
  --warn:#D48A00;--warn-lt:#FFF3D0;--danger:#D94F4F;--danger-lt:#FDEAEA;
  --done:#F0EDF8;--hdr:rgba(247,245,252,0.9);--shadow:rgba(139,111,200,0.12);
}
[data-theme="dark"]{
  --bg:#1C1118;--surface:#261820;--border:#3D2535;
  --primary:#F06080;--primary-dk:#D04060;--primary-lt:#3D2030;
  --accent:#C88060;--accent-lt:#302018;
  --text:#F5E8EC;--text-mid:#C8A0B0;--text-soft:#8A6070;
  --chip:#4A2838;--success:#5AB87A;--success-lt:#1A3028;
  --warn:#D48A00;--warn-lt:#2A2010;--danger:#E06060;--danger-lt:#2A1818;
  --done:#201520;--hdr:rgba(28,17,24,0.92);--shadow:rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:var(--hdr);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 18px;height:54px;display:flex;align-items:center;justify-content:space-between;transition:background .3s,border-color .3s;}
.logo{display:flex;align-items:center;gap:8px;font-family:'Gowun Batang',serif;font-size:19px;color:var(--text);}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--chip),var(--accent));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .3s;}
.logo em{color:var(--primary);font-style:normal;}
.theme-switcher{display:flex;align-items:center;gap:5px;}
.t-lbl{font-size:11px;color:var(--text-soft);margin-right:2px;}
.t-btn{width:22px;height:22px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;}
.t-btn:hover{transform:scale(1.15);}
.t-btn.on{border-color:var(--text);}
.t-pink{background:linear-gradient(135deg,#F7B8BF,#FFCBA4);}
.t-mint{background:linear-gradient(135deg,#9EDFC6,#A8D8C8);}
.t-purple{background:linear-gradient(135deg,#C8B8E8,#8B6FC8);}
.t-dark{background:linear-gradient(135deg,#3D2535,#1C1118);}

/* HERO */
.hero{position:relative;padding:40px 22px 36px;text-align:center;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(50px);pointer-events:none;opacity:.2;transition:background .3s;}
.blob1{width:220px;height:220px;background:var(--chip);top:-60px;left:-60px;}
.blob2{width:180px;height:180px;background:var(--accent);bottom:-40px;right:-40px;}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:var(--primary-lt);color:var(--primary-dk);font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:16px;transition:background .3s,color .3s;}
.hero h1{font-family:'Gowun Batang',serif;font-size:28px;line-height:1.45;color:var(--text);margin-bottom:10px;letter-spacing:-.5px;position:relative;z-index:1;}
.hero h1 mark{background:linear-gradient(180deg,transparent 55%,var(--primary-lt) 55%);color:var(--primary);padding:0 2px;}
.hero-desc{font-size:13.5px;color:var(--text-soft);line-height:1.75;margin-bottom:28px;}

/* INPUT CARD */
.input-card{background:var(--surface);border:1.5px solid var(--border);border-radius:22px;padding:20px 18px;box-shadow:0 8px 32px var(--shadow);position:relative;z-index:2;transition:background .3s,border-color .3s;}
.ic-title{font-size:12px;font-weight:700;color:var(--text-soft);letter-spacing:.6px;text-transform:uppercase;margin-bottom:12px;}
.input-row{display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;margin-bottom:9px;transition:border-color .2s,background .3s;}
.input-row:focus-within{border-color:var(--primary);}
.input-row span{font-size:18px;flex-shrink:0;}
.input-row input,.input-row select{flex:1;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);outline:none;min-width:0;transition:color .3s;}
.input-row input[type="text"]{max-width:72px;text-align:right;color:var(--text-soft);}
.input-row select{cursor:pointer;}
.btn-calc{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-dk));color:#fff;border:none;border-radius:14px;padding:15px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;letter-spacing:-.3px;transition:opacity .15s,transform .1s;box-shadow:0 4px 14px var(--shadow);}
.btn-calc:hover{opacity:.9;}
.btn-calc:active{transform:scale(.98);}

/* MAIN */
main{max-width:480px;margin:0 auto;padding:32px 16px 80px;position:relative;z-index:1;}

/* SUMMARY */
.sum-strip{display:none;gap:8px;margin-bottom:20px;}
.sum-strip.on{display:flex;}
.s-chip{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:13px 10px;text-align:center;transition:background .3s,border-color .3s;}
.s-chip .num{display:block;font-size:20px;font-weight:800;color:var(--primary);line-height:1;transition:color .3s;}
.s-chip .lbl{display:block;font-size:11px;color:var(--text-soft);margin-top:3px;}

/* FILTER TABS */
.filter-tabs{display:none;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:16px;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tabs.on{display:flex;}
.ftab{flex-shrink:0;padding:7px 15px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-family:'Noto Sans KR',sans-serif;font-size:12.5px;font-weight:500;color:var(--text-soft);cursor:pointer;transition:all .15s;white-space:nowrap;}
.ftab.on{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700;}

/* BENEFIT CARD */
.benefit-list{display:flex;flex-direction:column;gap:10px;}
.benefit-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px 16px 12px;cursor:pointer;transition:box-shadow .2s,transform .15s,background .3s,border-color .3s;animation:fadeUp .35s ease both;}
.benefit-card:hover{box-shadow:0 6px 24px var(--shadow);transform:translateY(-2px);}
.benefit-card.done{opacity:.5;background:var(--done);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:11px;}
.card-emoji{width:42px;height:42px;border-radius:12px;background:var(--primary-lt);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:background .3s;}
.card-meta{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.3;transition:color .3s;}
.card-amount{font-size:12.5px;color:var(--primary);font-weight:600;transition:color .3s;}
.dday-pill{flex-shrink:0;font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap;}
.pill-urgent{background:var(--danger-lt);color:var(--danger);}
.pill-soon{background:var(--warn-lt);color:var(--warn);}
.pill-ok{background:var(--success-lt);color:var(--success);}
.pill-done{background:var(--done);color:var(--text-soft);}
.card-bottom{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:10px;gap:8px;transition:border-color .3s;}
.card-info-text{font-size:11.5px;color:var(--text-soft);line-height:1.5;flex:1;min-width:0;}
.card-info-text strong{color:var(--text-mid);font-weight:600;}
.card-actions{display:flex;gap:5px;flex-shrink:0;}
.btn-done{background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:5px 10px;font-family:'Noto Sans KR',sans-serif;font-size:11.5px;font-weight:600;color:var(--text-mid);cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn-done:hover{background:var(--border);}
.btn-cal{background:var(--success-lt);border:none;border-radius:9px;padding:5px 10px;font-size:14px;cursor:pointer;transition:opacity .15s;line-height:1;}
.btn-cal:hover{opacity:.75;}
.btn-apply{background:var(--primary);border:none;border-radius:9px;padding:5px 10px;font-family:'Noto Sans KR',sans-serif;font-size:11.5px;font-weight:700;color:#fff;cursor:pointer;transition:opacity .15s;white-space:nowrap;text-decoration:none;display:inline-block;}
.btn-apply:hover{opacity:.85;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;backdrop-filter:blur(5px);}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:0 0 40px;width:100%;max-width:480px;margin:0 auto;max-height:88vh;overflow-y:auto;animation:sheetUp .32s cubic-bezier(.34,1.2,.64,1);position:relative;transition:background .3s;}
@keyframes sheetUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-handle-wrap{padding:14px 0 0;text-align:center;position:sticky;top:0;background:var(--surface);z-index:1;transition:background .3s;}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:4px;display:inline-block;}
.modal-close{position:absolute;top:10px;right:14px;width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;font-size:15px;cursor:pointer;color:var(--text-soft);display:flex;align-items:center;justify-content:center;transition:background .3s;}
.modal-body{padding:16px 20px 0;}
.modal-hero{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.modal-emoji{width:54px;height:54px;border-radius:16px;background:var(--primary-lt);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;transition:background .3s;}
.modal-title-text{font-size:18px;font-weight:700;color:var(--text);line-height:1.3;}
.modal-amount-text{font-size:13px;color:var(--primary);font-weight:600;margin-top:2px;}
.modal-sec{margin-bottom:16px;}
.modal-sec-label{font-size:11px;font-weight:700;color:var(--text-soft);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;}
.modal-sec p{font-size:13.5px;color:var(--text);line-height:1.75;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.info-box{background:var(--bg);border-radius:12px;padding:11px 13px;transition:background .3s;}
.info-box .ib-label{font-size:11px;color:var(--text-soft);margin-bottom:3px;}
.info-box .ib-val{font-size:13px;font-weight:700;color:var(--text);}
.tip-box{background:var(--primary-lt);border-radius:14px;padding:13px 15px;margin-top:14px;display:flex;gap:10px;align-items:flex-start;transition:background .3s;}
.tip-box .tip-icon{font-size:18px;flex-shrink:0;}
.tip-box p{font-size:13px;color:var(--primary-dk);line-height:1.65;transition:color .3s;}
.modal-cta{display:flex;gap:8px;margin-top:18px;}
.modal-cta button,.modal-cta a{flex:1;padding:14px;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;border:none;display:block;transition:opacity .15s;}
.cta-cal{background:var(--success-lt);color:var(--success);border:1.5px solid var(--success)!important;}
.cta-apply{background:var(--primary);color:#fff;}
.cta-apply:hover,.cta-cal:hover{opacity:.85;}

/* EMPTY */
.empty-state{text-align:center;padding:56px 24px;}
.empty-emo{font-size:52px;margin-bottom:14px;}
.empty-state h3{font-size:17px;font-weight:700;margin-bottom:8px;}
.empty-state p{font-size:13.5px;color:var(--text-soft);line-height:1.7;}

/* AD */
.ad-slot{background:var(--surface);border:1.5px dashed var(--border);border-radius:14px;height:88px;display:none;align-items:center;justify-content:center;color:var(--text-soft);font-size:12px;margin:16px 0;transition:background .3s,border-color .3s;}
.ad-slot.on{display:flex;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;z-index:500;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── 하단 탭바 ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--hdr);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;z-index:150;padding-bottom:env(safe-area-inset-bottom);transition:background .3s,border-color .3s;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;cursor:pointer;transition:all .15s;border:none;background:transparent;gap:3px;}
.nav-tab .nav-icon{font-size:22px;line-height:1;}
.nav-tab .nav-label{font-size:10px;font-weight:600;color:var(--text-soft);letter-spacing:-0.2px;font-family:'Noto Sans KR',sans-serif;}
.nav-tab.on .nav-label{color:var(--primary);}
.nav-tab.on .nav-icon{transform:scale(1.12);}

/* 탭 콘텐츠 */
.tab-content{display:none;}
.tab-content.on{display:block;}

/* 베이비페어 */
.fair-list{display:flex;flex-direction:column;gap:10px;}
.fair-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:16px;transition:background .3s,border-color .3s;animation:fadeUp .35s ease both;}
.fair-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.fair-emoji{width:42px;height:42px;border-radius:12px;background:var(--primary-lt);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.fair-meta{flex:1;min-width:0;}
.fair-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.fair-venue{font-size:12px;color:var(--text-soft);}
.fair-bottom{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:10px;}
.fair-date{font-size:12px;color:var(--text-mid);}
.fair-dday{font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;}
.fair-link{background:var(--primary);color:#fff;border:none;border-radius:9px;padding:6px 14px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}

/* 달빛/심야약국 CSS */
.night-tabs{display:flex;gap:8px;margin-bottom:16px;}
.night-tab{flex:1;padding:10px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;color:var(--text-soft);cursor:pointer;transition:all .15s;text-align:center;}
.night-tab.on{background:var(--primary);border-color:var(--primary);color:#fff;}
.night-iframe-wrap{display:none;}
.night-search{display:flex;gap:8px;margin-bottom:14px;}
.night-search select{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s,background .3s;}
.night-search select:focus{border-color:var(--primary);}
.btn-search{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:11px 16px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.night-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:10px;transition:background .3s,border-color .3s;animation:fadeUp .3s ease both;}
.night-card-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
.night-card-addr{font-size:12px;color:var(--text-soft);margin-bottom:6px;}
.night-card-bottom{display:flex;align-items:center;justify-content:space-between;}
.night-hours{font-size:12px;color:var(--success);font-weight:600;}
.night-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--primary-lt);color:var(--primary-dk);}
.night-empty{text-align:center;padding:40px 20px;color:var(--text-soft);font-size:14px;line-height:1.7;}

main{padding-bottom:90px;}
</style>
</head>
<body data-theme="pink">

<header>
  <div class="logo">
    <div class="logo-icon">🌸</div>
    아이<em>달력</em>
  </div>
  <div class="theme-switcher">
    <span class="t-lbl">테마</span>
    <button class="t-btn t-pink on"    onclick="setTheme('pink','핑크 🌸')"    title="핑크"></button>
    <button class="t-btn t-mint"       onclick="setTheme('mint','민트 🌿')"    title="민트"></button>
    <button class="t-btn t-purple"     onclick="setTheme('lavender','퍼플 💜')" title="퍼플"></button>
    <button class="t-btn t-dark"       onclick="setTheme('dark','다크 🌙')"    title="다크"></button>
  </div>
</header>

<!-- 탭 콘텐츠 1: 지원금 -->
<div class="tab-content on" id="tab-benefit">
<section class="hero">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="hero-badge">🍼 2025·2026 최신 정보</div>
  <h1>놓치면 <mark>못 받는 돈</mark>,<br>달력이 알려드려요</h1>
  <p class="hero-desc">아이 생년월일만 입력하면<br>신청 가능한 지원금과 마감일을 한눈에!</p>
  <div class="input-card">
    <div class="ic-title">👶 아이 생년월일</div>
    <div class="input-row">
      <span>🧒</span>
      <input type="date" id="childDob" onchange="saveDob()">
    </div>
    <div class="input-row">
      <span>📍</span>
      <select id="regionSelect" onchange="saveRegion()">
        <option value="">거주 지역 (선택)</option>
        <option>서울특별시</option><option>부산광역시</option><option>대구광역시</option>
        <option>인천광역시</option><option>광주광역시</option><option>대전광역시</option>
        <option>울산광역시</option><option>세종특별자치시</option><option>경기도</option>
        <option>강원도</option><option>충청북도</option><option>충청남도</option>
        <option>전라북도</option><option>전라남도</option><option>경상북도</option>
        <option>경상남도</option><option>제주특별자치도</option>
      </select>
    </div>
    <button class="btn-calc" onclick="calculate()">🔍 지원금 확인하기</button>
  </div>
</section>
<main>
  <div id="emptyState" class="empty-state">

<script>
/* ── 로컬 푸시 알림 (Capacitor) ── */
let notifPlugin = null;

async function initNotifications() {
  try {
    const { LocalNotifications } = await import('https://esm.sh/@capacitor/local-notifications@8.2.0');
    notifPlugin = LocalNotifications;
    const perm = await LocalNotifications.requestPermissions();
    if (perm.display === 'granted') {
      console.log('✅ 알림 권한 허용됨');
    }
  } catch(e) {
    console.log('알림 플러그인 초기화 실패 (웹 환경에서는 정상):', e.message);
  }
}

async function scheduleNotifications(benefits) {
  if (!notifPlugin) return;
  try {
    // 기존 알림 전체 취소
    const pending = await notifPlugin.getPending();
    if (pending.notifications.length > 0) {
      await notifPlugin.cancel({ notifications: pending.notifications });
    }

    const today = new Date();
    const notifications = [];

    benefits.forEach(b => {
      if (b.dday < 0 || b.dday > 60) return; // 만료·60일 초과 제외

      // D-7 알림
      const d7 = new Date(b.deadlineDate);
      d7.setDate(d7.getDate() - 7);
      d7.setHours(9, 0, 0, 0);
      if (d7 > today) {
        notifications.push({
          id: Math.abs(b.id.charCodeAt(1) * 100 + 7),
          title: '🍼 아이달력 마감 알림',
          body: `${b.name} 신청 마감 7일 전이에요!`,
          schedule: { at: d7 },
          sound: null,
          actionTypeId: '',
          extra: { benefitId: b.id }
        });
      }

      // D-1 알림
      const d1 = new Date(b.deadlineDate);
      d1.setDate(d1.getDate() - 1);
      d1.setHours(9, 0, 0, 0);
      if (d1 > today) {
        notifications.push({
          id: Math.abs(b.id.charCodeAt(1) * 100 + 1),
          title: '🚨 아이달력 내일 마감!',
          body: `${b.name} 신청 마감이 내일이에요! 지금 바로 신청하세요.`,
          schedule: { at: d1 },
          sound: null,
          actionTypeId: '',
          extra: { benefitId: b.id }
        });
      }
    });

    if (notifications.length > 0) {
      await notifPlugin.schedule({ notifications });
      console.log(`✅ 알림 ${notifications.length}개 등록됨`);
      showToast(`🔔 마감 알림 ${notifications.length}개가 등록됐어요!`);
    }
  } catch(e) {
    console.log('알림 등록 실패:', e.message);
  }
}

function saveDob() {
  const v = document.getElementById('childDob').value;

}
function saveRegion() {
  const v = document.getElementById('regionSelect').value;
  localStorage.setItem('childRegion', v);
}
function loadSavedInputs() {
  const dob = localStorage.getItem('childDob');
  const region = localStorage.getItem('childRegion');
  if (dob) {
    document.getElementById('childDob').value = dob;

    calculate();

  if (region) {
    document.getElementById('regionSelect').value = region;
  }
}

const T_IDX={pink:0,mint:1,lavender:2,dark:3};
function setTheme(t,label){
  document.body.setAttribute('data-theme',t);
  localStorage.setItem('theme',t);
  document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.t-btn')[T_IDX[t]].classList.add('on');
  showToast(label+' 테마로 변경됐어요');
}
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

/* ── UTILS ── */
function am(d,n){const r=new Date(d);r.setMonth(r.getMonth()+n);return r;}
function ad(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function dd(t,now){return Math.ceil((t-now)/(864e5));}
function fmt(d){return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;}
function fmtN(n){if(n>=10000)return(n/10000).toFixed(0)+'억+';if(n>=1000)return(n/1000).toFixed(0)+'천만+';return n+'만원+';}
function p2(v){return String(v).padStart(2,'0');}

/* ── 구글 캘린더 URL 방식 ── */
function icsDate(d){return`${d.getFullYear()}${p2(d.getMonth()+1)}${p2(d.getDate())}`;}
function openGoogleCalendar(b){
  const dl = b.deadlineDate;
  const start = icsDate(dl);
  const end   = icsDate(ad(dl,1));
  const title = encodeURIComponent(`🍼 ${b.name} 신청 마감`);
  const detail= encodeURIComponent(`${b.condLabel}\n신청처: ${b.place}\n${b.url}`);
  const gcUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${detail}`;
  window.open(gcUrl, '_blank');
  showToast('📅 구글 캘린더가 열렸어요!');
}
// 하위 호환용 alias
function downloadIcs(b){ openGoogleCalendar(b); }
function dlIcs(id){const b=cur.find(x=>x.id===id);if(b)openGoogleCalendar(b);}

/* ── JSON 데이터 로드 ── */
const JSON_URL = 'https://babyfairschedule.co.kr/aidiary/benefits.json';

async function loadBenefits() {
  try {
    const res = await fetch(JSON_URL + '?v=' + Date.now());
    const json = await res.json();
    B_DATA = json.benefits.map(b => ({
      ...b,
      cond: (m) => m >= b.conditionMonthMin && m < b.conditionMonthMax,
      dl: (dob) => {
        if (b.deadlineType === 'addMonths') return am(dob, b.deadlineValue);
        if (b.deadlineType === 'addDays')   return ad(dob, b.deadlineValue);
        if (b.deadlineType === 'fixedMonth') {
          const d = new Date(); d.setMonth(b.deadlineValue - 1); d.setDate(31); return d;
        }
        return am(dob, 12);
      },
      n: b.amountNum,
      condLabel: b.conditionLabel,
    }));
    console.log(`✅ benefits.json 로드 완료 (${B_DATA.length}개, v${json.version})`);
  } catch(e) {
    console.warn('JSON 로드 실패, 내장 데이터 사용:', e);
    B_DATA = B; // 실패 시 기존 하드코딩 데이터 폴백
  }
}

/* ── CALCULATE ── */
function calculate(){
  const dobV=document.getElementById('childDob').value;
  if(!dobV){showToast('생년월일을 입력해 주세요 👶');return;}
  const today=new Date();today.setHours(0,0,0,0);
  const dob=new Date(dobV);dob.setHours(0,0,0,0);
  const ageM=(today.getFullYear()-dob.getFullYear())*12+(today.getMonth()-dob.getMonth());
  const source = B_DATA.length > 0 ? B_DATA : B;
  cur=source.filter(b=>b.cond(ageM,1)).map(b=>{
    const deadlineDate=b.dl(dob);
    return{...b,childName:'아이',dob,deadlineDate,dday:dd(deadlineDate,today)};
  }).sort((a,b)=>a.dday-b.dday);
  document.getElementById('emptyState').style.display='none';
  document.getElementById('sumStrip').classList.add('on');
  document.getElementById('filterTabs').classList.add('on');
  // adSlot hidden
  renderSum(); renderList(curFilter);
  // 마감 알림 자동 등록
  scheduleNotifications(cur);
}

function renderSum(){
  document.getElementById('sumTotal').textContent=cur.length+'개';
  document.getElementById('sumUrgent').textContent=cur.filter(b=>b.dday<=7&&b.dday>=0&&!doneSet.has(b.id)).length+'개';
  document.getElementById('sumAmt').textContent=fmtN(cur.reduce((s,b)=>s+b.n,0));
}

function getBadge(dday,id){
  if(doneSet.has(id))return{cls:'pill-done',t:'완료'};
  if(dday<0)return{cls:'pill-done',t:'만료'};
  if(dday===0)return{cls:'pill-urgent',t:'D-Day'};
  if(dday<=7)return{cls:'pill-urgent',t:`D-${dday}`};
  if(dday<=30)return{cls:'pill-soon',t:`D-${dday}`};
  return{cls:'pill-ok',t:`D-${dday}`};
}
function getSt(b){
  if(doneSet.has(b.id))return'done';
  if(b.dday<0)return'expired';
  if(b.dday<=7)return'urgent';
  if(b.dday<=30)return'soon';
  return'ok';
}
function applyFilter(type,btn){
  curFilter=type;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  renderList(type);
}
function renderList(f){
  const list=document.getElementById('benefitList');
  let filtered=f==='all'?cur:f.startsWith('cat_')?cur.filter(b=>b.cat===f.slice(4)):cur.filter(b=>getSt(b)===f);
  if(!filtered.length){list.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text-soft);font-size:14px;">해당 항목이 없어요 😊</div>`;return;}
  list.innerHTML=filtered.map((b,i)=>{
    const bd=getBadge(b.dday,b.id);
    const done=doneSet.has(b.id);
    return`<div class="benefit-card${done?' done':''}" style="animation-delay:${i*.04}s" onclick="openModal('${b.id}')">
      <div class="card-top">
        <div class="card-emoji">${b.emoji}</div>
        <div class="card-meta">
          <div class="card-name">${b.name}</div>
          <div class="card-amount">${b.amount}</div>
        </div>
        <div class="dday-pill ${bd.cls}">${bd.t}</div>
      </div>
      <div class="card-bottom">
        <div class="card-info-text"><strong>${b.childName}</strong> · ${b.condLabel}<br>마감 ${b.dday>=0?fmt(b.deadlineDate):'기간 만료'}</div>
        <div class="card-actions">
          ${!done?`<button class="btn-done" onclick="toggleDone(event,'${b.id}')">완료</button>`:''}
          <button class="btn-cal" onclick="event.stopPropagation();dlIcs('${b.id}')" title="캘린더에 추가">📅</button>
          <a class="btn-apply" href="javascript:void(0)" onclick="openLink('${b.url}');event.stopPropagation()">신청</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function dlIcs(id){const b=cur.find(x=>x.id===id);if(b)downloadIcs(b);}

function toggleDone(e,id){
  e.stopPropagation();
  doneSet.has(id)?doneSet.delete(id):doneSet.add(id);
  localStorage.setItem('done',JSON.stringify([...doneSet]));
  renderSum();renderList(curFilter);
}

// HTTP GET 요청 (앱: CapacitorHttp / 웹: fetch)
async function httpGet(url) {
  if (httpPlugin) {
    const res = await httpPlugin.get({ url });
    return res.data; // 문자열 또는 객체
  } else {
    const res = await fetch(url);
    return await res.text();
  }
}

    return;
  }

  list.innerHTML = [...items].map((item,i) => {
    const name = item.querySelector('yadmNm')?.textContent || '';
    const addr = item.querySelector('addr')?.textContent || '';
    const tel  = item.querySelector('telno')?.textContent || '';
    const mon  = item.querySelector('monTreatTime')?.textContent || '';
    return `<div class="night-card" style="animation-delay:${i*.04}s">
      <div class="night-card-name">🏥 ${name}</div>
      <div class="night-card-addr">📍 ${addr}</div>

}

async function searchPharmacy(region, list) {
  const API_KEY = 'OVzrs%2BrFzZKkBiMl43c2lnFpOHYBM6TFB6P7bOFlXvkSLvQOeVhuvMVQFaOZ0Z%2BAYbItA9ZkIFcjMLw2nFULpA%3D%3D';
